name: Godot Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  export-android:
    name: Export Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.2.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable

      - name: Create export directory
        run: mkdir -p build/android

      - name: Export Android Debug APK
        run: |
          godot --headless --verbose --export-debug "Android" build/android/Runner.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-Android
          path: build/android/Runner.apk
          if-no-files-found: warn
